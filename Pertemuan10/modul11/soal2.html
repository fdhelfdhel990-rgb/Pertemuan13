<!DOCTYPE html>
<html>
<head>
    <title>Data Praktikan PPW1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Input Data Praktikan</h2>
    <button class="btn btn-success" onclick="inputData()">Cek Status</button>
    <div id="hasil-tabel" class="mt-4"></div>
    <script>
        function inputData() {
            let yakin = confirm("Apakah anda praktikan PPW1?");
            if (yakin) {
                let nama = prompt("Masukkan Nama:");
                let nim = prompt("Masukkan NIM:");
                let angkatan = prompt("Masukkan Angkatan:");
                document.getElementById("hasil-tabel").innerHTML = `
                    <table class="table table-dark table-striped">
                        <tr><th>Nama</th><td>${nama}</td></tr>
                        <tr><th>NIM</th><td>${nim}</td></tr>
                        <tr><th>Angkatan</th><td>${angkatan}</td></tr>
                    </table>`;
            } else {
                alert("Anda bukan praktikan PPW1, anda tidak boleh masuk!");
                document.getElementById("hasil-tabel").innerHTML = "<p class='text-danger'>Akses Ditolak.</p>";
            }
        }
    </script>
</body>
</html>
