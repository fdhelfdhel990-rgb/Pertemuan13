<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 2 - Formulir Pendaftaran Mahasiswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-top: 50px;
            margin-bottom: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="alert alert-success alert-dismissible fade show mt-4 d-none" role="alert" id="successAlert">
                    <strong>Berhasil!</strong> Data pendaftaran mahasiswa telah tersimpan.
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div class="form-container">
                    <h2 class="text-center mb-4 text-primary">Pendaftaran Mahasiswa Baru</h2>
                    <p class="text-center text-muted mb-4">Silakan lengkapi formulir di bawah ini dengan data yang benar.</p>
                    <form>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="namaLengkap" class="form-label">Nama Lengkap</label>
                                <input type="text" class="form-control" id="namaLengkap" placeholder="Masukkan nama lengkap" required>
                            </div>
                            <div class="col-md-6">
                                <label for="nim" class="form-label">NIM</label>
                                <!-- Contoh Validasi Visual: is-invalid -->
                                <input type="text" class="form-control is-invalid" id="nim" placeholder="Contoh: 25/568222/SV/27396" required>
                                <div class="invalid-feedback">
                                    NIM harus diisi sesuai format universitas.
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Mahasiswa</label>
                            <input type="email" class="form-control is-valid" id="email" value="fadhel@mail.ugm.ac.id" required>
                            <div class="valid-feedback">
                                Format email sudah benar!
                            </div>
                        </div>

                        <!-- 4. PROGRAM STUDI & SEMESTER -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="prodi" class="form-label">Program Studi</label>
                                <select class="form-select" id="prodi" required>
                                    <option selected disabled value="">Pilih Program Studi...</option>
                                    <option value="rpl">D4 Teknologi Rekayasa Perangkat Lunak</option>
                                    <option value="tk">D4 Teknologi Rekayasa Internet</option>
                                    <option value="ti">D4 Teknologi Rekayasa Elektro</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="semester" class="form-label">Semester</label>
                                <select class="form-select" id="semester" required>
                                    <option selected disabled value="">Pilih Semester...</option>
                                    <option value="1">Semester 1</option>
                                    <option value="2">Semester 2</option>
                                    <option value="3">Semester 3</option>
                                    <option value="4">Semester 4</option>
                                    <option value="5">Semester 5</option>
                                    <option value="6">Semester 6</option>
                                    <option value="7">Semester 7</option>
                                    <option value="8">Semester 8</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="alamat" class="form-label">Alamat Lengkap</label>
                            <textarea class="form-control" id="alamat" rows="3" placeholder="Masukkan alamat domisili saat ini"></textarea>
                        </div>
                        <div class="mb-4">
                            <label for="foto" class="form-label">Upload Foto Profil</label>
                            <input class="form-control" type="file" id="foto">
                            <div class="form-text">Format: JPG/PNG, Maksimal 2MB.</div>
                        </div>
                        <div class="d-flex gap-2 justify-content-end">
                            <button type="reset" class="btn btn-outline-secondary">Reset</button>
                            <button type="button" class="btn btn-primary" onclick="showSuccess()">Simpan Data</button>
                        </div>
                    </form>
                </div>
                <footer class="text-center text-muted mb-5">
                    <small>&copy; 2026 Fadhel - UGM Software Engineering</small>
                </footer>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showSuccess() {
            const alert = document.getElementById('successAlert');
            alert.classList.remove('d-none');
            window.scrollTo(0, 0); 
        }
    </script>
</body>
</html>
